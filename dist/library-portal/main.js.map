<div class="login-container">
  <div class="login-card">
    <h2>User Login</h2>
    <form (ngSubmit)="loginUser()">
      <div class="form-group">
        <label for="email">Email:</label>
        <input 
          type="email" 
          id="email" 
          name="email" 
          [(ngModel)]="email" 
          required 
          email
          placeholder="Enter your email"
        />
      </div>

      <div class="form-group">
        <label for="password">Password:</label>
        <input 
          type="password" 
          id="password" 
          name="password" 
          [(ngModel)]="password" 
          required 
          placeholder="Enter your password"
        />
      </div>

      <div class="error-message" *ngIf="errorMessage">
        {{ errorMessage }}
      </div>

      <button type="submit" class="login-btn" [disabled]="isLoading || !validateUser()">
        <span *ngIf="!isLoading">Login</span>
        <span *ngIf="isLoading">Logging in...</span>
      </button>
    </form>

    <div class="login-links">
      <p>Don't have an account? <a (click)="goToRegister()">Register here</a></p>
      <p>Are you an admin? <a (click)="goToAdminLogin()">Admin Login</a></p>
    </div>
  </div>
</div>
